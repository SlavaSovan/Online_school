version: '3.8'

services:
  # ----------- INFRASTRUCTURE -----------
  pg:
    image: postgres:18.1
    container_name: postgres-main
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      COURSES_DB_NAME: ${COURSES_DB_NAME}
      COURSES_DB_USER: ${COURSES_DB_USER}
      COURSES_DB_PASSWORD: ${COURSES_DB_PASSWORD}
      TASKS_DB_NAME: ${TASKS_DB_NAME}
      TASKS_DB_USER: ${TASKS_DB_USER}
      TASKS_DB_PASSWORD: ${TASKS_DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./create-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      pg:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:8.6
    container_name: redis-main
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped


  # ---------- SANDBOX BUILDER -----------
  sandbox-builder:
    build:
      context: ./services/tasks/app/sandbox/docker/python
      dockerfile: Dockerfile
    image: sandbox-python:latest
    container_name: sandbox-builder
    profiles: ["build"]  # Запускается только при сборке
    restart: "no"


  # ----------- MICROSERVICES ------------
  users-service:
    build:
      context: ./services/users
      dockerfile: Dockerfile
    container_name: users-service
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${USERS_DB_NAME}
      DB_USER: ${USERS_DB_USER}
      DB_PASSWORD: ${USERS_DB_PASSWORD}
    ports:
      - "8001:8000"
    volumes:
      - ./services/users/:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 8s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  courses-service:
    build:
      context: ./microservice-courses
      dockerfile: Dockerfile
    container_name: courses-service
    environment:
      SECRET_KEY: ${COURSES_SECRET_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${COURSES_DB_NAME}
      DB_USER: ${COURSES_DB_USER}
      DB_PASSWORD: ${COURSES_DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_REGION: ${S3_REGION}
      MAX_FILE_SIZE_MB: ${COURSES_MAX_FILE_SIZE_MB}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
    ports:
      - "8002:8000"
    volumes:
      - ./services/courses/:/app
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
      users-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 8s
      timeout: 8s
      retries: 5
    restart: unless-stopped

  tasks-service:
    build:
      context: ./microservice-tasks
      dockerfile: Dockerfile
    container_name: tasks-service
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${TASKS_DB_NAME}
      DB_USER: ${TASKS_DB_USER}
      DB_PASSWORD: ${TASKS_DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_REGION: ${S3_REGION}
      MAX_FILE_SIZE_MB: ${TASKS_MAX_FILE_SIZE_MB}
      ALLOWED_FILE_TYPES: ${TASKS_ALLOWED_FILE_TYPES}
      MAX_FILENAME_LENGTH: ${TASKS_MAX_FILENAME_LENGTH}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
      COURSES_SERVICE_URL: ${COURSES_SERVICE_URL}
      # Переменная для docker.from_env() (указываю явно, но это не обязательно)
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "8003:8000"
    volumes:
      - ./services/tasks/:/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
      users-service:
        condition: service_healthy
      courses-service:
        condition: service_healthy
      sandbox-builder:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 8s
      timeout: 8s
      retries: 8
    restart: unless-stopped

